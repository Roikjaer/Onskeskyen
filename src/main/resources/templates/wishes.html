<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Mine ønskelister</title>
    <style>
        body { margin:0; font-family:Arial; background:#e0f7ff; }
        header { background:#0f6f8f; color:white; padding:15px; display:flex; justify-content:space-between; }
        .container { padding:20px; }
        .card { background:white; padding:12px; border-radius:10px; margin-bottom:10px; }
        button { background:#0f6f8f; color:white; border:none; padding:6px 10px; }
    </style>
</head>
<body>

<header>
    ☁️ Ønskeskyen

    <div>
        <a href="#" onclick="alert('Nicolai er den varmeste løve 🦁')"
           style="color:white; margin-right:15px; text-decoration:none;">
            .
        </a>

        <form method="post" action="/logout" style="display:inline;">
            <button>Logout</button>
        </form>
    </div>
</header>

<div class="container">

    <h2>Mine ønskelister</h2>

    <a href="/users">🔍 Find andre</a>

    <form method="post" action="/wishlists/create" class="card">
        <input type="text" name="name" placeholder="Navn" required>
        <button>Opret</button>
    </form>

    <div th:each="wl : ${wishlists}" class="card">

        <h3 th:text="${wl.name}"></h3>

        <a th:href="@{/wishlists/{id}(id=${wl.id})}">Åbn</a>

        <form method="post" action="/wishlists/delete">
            <input type="hidden" name="id" th:value="${wl.id}">
            <button>🗑</button>
        </form>

    </div>

    <hr>

    <h3>Reserverede ønsker</h3>

    <div th:each="rw : ${reservedWishes}" class="card">
        <span th:text="${rw.text}"></span>
        — <span th:text="${rw.user.name}"></span>
    </div>

</div>

</body>
</html>
