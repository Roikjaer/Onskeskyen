<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login</title>
    <style>
        body { margin:0; font-family:Arial; background:linear-gradient(#1ca9c9,#e0f7ff); }
        header { background:#0f6f8f; color:white; padding:15px; }
        .container { padding:20px; text-align:center; }
        .card { background:white; padding:20px; border-radius:10px; display:inline-block; }
        button { background:#0f6f8f; color:white; border:none; padding:8px 15px; border-radius:10px; }
    </style>
</head>
<body>

<header>☁️ Ønskeskyen</header>

<div class="container">
    <h1>Login</h1>

    <p th:if="${param.error}" style="color:red;">Login fejlede</p>

    <form method="post" action="/login" class="card">
        <input type="text" name="username" placeholder="Email" required><br><br>
        <input type="password" name="password" required><br><br>
        <button type="submit">Login</button>
    </form>

    <br><br>
    <a href="/register">Opret bruger</a>
</div>

</body>
</html>
