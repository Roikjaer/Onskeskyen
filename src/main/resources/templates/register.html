<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Register</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(180deg, #dff6ff 0%, #f8fdff 100%);
        }

        header {
            background: rgba(255,255,255,0.6);
            backdrop-filter: blur(10px);
            padding: 15px;
            font-size: 20px;
            font-weight: bold;
            color: #0f6f8f;
        }


        .logo {
            display: inline-block;
            padding: 6px 10px;
            border-radius: 10px;
            color: #0f6f8f;
            font-weight: bold;
            transition: 0.2s;
        }

        .logo:hover {
            background: rgba(79, 195, 220, 0.25);
            transform: scale(1.03);
        }

        .logo:active {
            background: rgba(79, 195, 220, 0.35);
            transform: scale(0.98);
        }

        .logo.disabled {
            cursor: default;
            opacity: 0.9;
        }

        .container {
            padding: 40px;
            text-align: center;
        }

        h1 {
            color: #0f6f8f;
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 15px;
            display: inline-block;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        input {
            padding: 10px;
            margin-top: 10px;
            border-radius: 10px;
            border: 1px solid #ccc;
            width: 220px;
        }

        button {
            margin-top: 10px;
            background: #0f6f8f;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 10px;
        }

        a {
            color: #0f6f8f;
            text-decoration: none;
        }
    </style>
</head>

<body>

<header>
    <div class="logo disabled">☁️ Ønskeskyen</div>
</header>

<div class="container">

    <h1>Opret bruger</h1>

    <form method="post" action="/register" class="card">
        <input type="text" name="name" placeholder="Navn" required><br>
        <input type="email" name="email" placeholder="Email" required><br>
        <input type="password" name="password" placeholder="Password" required><br>
        <button type="submit">Opret</button>
    </form>

</div>

</body>
</html>
