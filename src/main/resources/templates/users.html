<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Find ønskelister</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;

            /* Cloud theme */
            background: linear-gradient(180deg, #dff6ff 0%, #f8fdff 100%);

            background-image:
                    radial-gradient(circle at 20% 30%, rgba(255,255,255,0.6) 60px, transparent 61px),
                    radial-gradient(circle at 70% 20%, rgba(255,255,255,0.5) 80px, transparent 81px),
                    radial-gradient(circle at 50% 70%, rgba(255,255,255,0.4) 100px, transparent 101px);
            background-repeat: no-repeat;
        }

        header {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(10px);
            color: #0f6f8f;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
            font-size: 20px;
        }

        /* LOGO */
        .logo {
            text-decoration: none;
            color: #0f6f8f;
            font-weight: bold;
            font-size: 18px;
            padding: 5px 10px;
            border-radius: 10px;
            transition: 0.2s;
        }

        .logo:hover {
            background: rgba(15, 111, 143, 0.15);
            transform: scale(1.05);
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        h1 {
            text-align: center;
            color: #0f6f8f;
            margin-bottom: 10px;
        }

        a {
            color: #0f6f8f;
            text-decoration: none;
            font-weight: bold;
        }

        a:hover {
            text-decoration: underline;
        }

        /* SEARCH CARD */
        .search-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            padding: 16px;
            border-radius: 15px;
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
        }

        input {
            flex: 1;
            padding: 10px;
            border-radius: 10px;
            border: 1px solid #ccc;
            font-size: 14px;
        }

        input:focus {
            outline: none;
            border-color: #4fc3dc;
        }

        button {
            background: linear-gradient(135deg, #4fc3dc, #0f6f8f);
            color: white;
            border: none;
            padding: 10px 14px;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover {
            transform: scale(1.05);
        }

        /* USER CARD */
        .user-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            padding: 16px;
            border-radius: 15px;
            margin-bottom: 12px;

            display: flex;
            justify-content: space-between;
            align-items: center;

            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
            transition: 0.2s;
        }

        .user-card:hover {
            transform: translateY(-2px);
        }

        .name {
            font-weight: bold;
            color: #2b4f5a;
        }

        .email {
            font-size: 13px;
            color: #5a8a9a;
        }

        .open-btn {
            background: #0f6f8f;
            padding: 7px 12px;
            border-radius: 12px;
            color: white;
            font-size: 13px;
            text-decoration: none;
        }

        .open-btn:hover {
            background: #0c5a73;
        }

        .empty {
            text-align: center;
            color: #5a8a9a;
            margin-top: 20px;
        }
    </style>
</head>

<body>

<header>
    <a href="/wishes" class="logo">☁️ Ønskeskyen</a>
</header>

<div class="container">

    <h1>Find ønskelister</h1>

    <!-- SEARCH -->
    <form method="get" action="/users" class="search-card">
        <input type="text" name="search" placeholder="Søg efter brugere...">
        <button>Søg</button>
    </form>

    <!-- EMPTY -->
    <div th:if="${users.isEmpty()}" class="empty">
        Ingen brugere fundet ☁️
    </div>

    <!-- USERS -->
    <div th:each="u : ${users}" class="user-card">

        <div>
            <div class="name" th:text="${u.name}"></div>
            <div class="email" th:text="${u.email}"></div>
        </div>

        <a class="open-btn"
           th:href="@{/users/{id}/wishlists(id=${u.id})}">
            Se ønskelister
        </a>

    </div>

</div>

</body>
</html>
