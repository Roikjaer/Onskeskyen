<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title th:text="${profileUser.name} + 's ønskeliste'"></title>
    <style>
        body { margin:0; font-family:Arial; background:linear-gradient(#1ca9c9,#e0f7ff); }
        header { background:#0f6f8f; color:white; padding:15px; }
        .container { padding:20px; }
        .card { background:white; padding:12px; border-radius:10px; margin-bottom:10px; }
        button { background:#0f6f8f; color:white; border:none; padding:6px 10px; border-radius:8px; }
    </style>
</head>
<body>

<header>☁️ Ønskeskyen</header>

<div class="container">

    <h1 th:text="${wishlist.name}"></h1>
    <p>Af <span th:text="${profileUser.name}"></span></p>

    <a href="/users">← Find flere ønskelister</a>

    <hr>

    <div th:if="${isOwner}" class="card">
        <p style="color: gray;">Du ser din egen ønskeliste.</p>

        <div th:each="w : ${wishes}" class="card">
            <span th:text="${w.text}"></span>
        </div>
    </div>

    <div th:if="${!isOwner}">

        <div th:if="${wishes.isEmpty()}" class="card">
            <p>Ingen ønsker endnu.</p>
        </div>

        <div th:each="w : ${wishes}" class="card">

            <span th:text="${w.text}"></span>

            <div th:if="${currentUser != null}">

                <div th:if="${w.reserved and w.reservedBy.id == currentUser.id}">
                    <strong style="color:green;">✅ Du har reserveret</strong>
                    <form method="post" action="/wishes/unreserve">
                        <input type="hidden" name="id" th:value="${w.id}">
                        <input type="hidden" name="wishlistId" th:value="${wishlist.id}">
                        <button>Fortryd</button>
                    </form>
                </div>

                <div th:if="${w.reserved and w.reservedBy.id != currentUser.id}">
                    🔒 Allerede reserveret
                </div>

                <div th:if="${!w.reserved}">
                    <form method="post" action="/wishes/reserve">
                        <input type="hidden" name="id" th:value="${w.id}">
                        <input type="hidden" name="wishlistId" th:value="${wishlist.id}">
                        <button>🎁 Reservér</button>
                    </form>
                </div>

            </div>

            <div th:if="${currentUser == null and w.reserved}">
                🔒 Allerede reserveret
            </div>

            <div th:if="${currentUser == null and !w.reserved}">
                (<a href="/login">Log ind</a>)
            </div>

        </div>
    </div>

</div>
</body>
</html>
