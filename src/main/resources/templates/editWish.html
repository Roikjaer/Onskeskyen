<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Rediger ønske</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #dff6ff;
        }

        header {
            background: rgba(255,255,255,0.6);
            padding: 15px;
            color: #0f6f8f;
            font-weight: bold;
        }

        .logo {
            display: inline-block;
            padding: 6px 10px;
            border-radius: 10px;
            text-decoration: none;
        }

        .logo:hover {
            background: rgba(79,195,220,0.25);
        }

        .container {
            text-align: center;
            padding: 40px;
        }

        .card {
            background: white;
            padding: 20px;
            display: inline-block;
            border-radius: 12px;
        }

        input {
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        button {
            background: #0f6f8f;
            color: white;
            border: none;
            padding: 8px 12px;
        }
    </style>
</head>

<body>

<header>
    <a href="/wishes" class="logo">☁️ Ønskeskyen</a>
</header>

<div class="container">

    <h2>Rediger ønske</h2>

    <form method="post" action="/wishes/edit" class="card">
        <input type="hidden" name="id" th:value="${wish.id}">
        <input type="text" name="text" th:value="${wish.text}">
        <button>Gem</button>
    </form>

</div>

</body>
</html>
