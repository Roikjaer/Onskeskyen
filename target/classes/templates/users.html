<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Find ønskelister</title>
    <style>
        body { margin:0; font-family:Arial; background:#e0f7ff; }
        header { background:#0f6f8f; color:white; padding:15px; }
        .container { padding:20px; }
        .card { background:white; padding:10px; border-radius:8px; margin-bottom:8px; }
        button { background:#0f6f8f; color:white; border:none; padding:5px 10px; }
    </style>
</head>
<body>

<header>☁️ Ønskeskyen</header>

<div class="container">

    <h1>Find ønskelister</h1>

    <a href="/wishes">← Tilbage</a>

    <form method="get" action="/users" class="card">
        <input type="text" name="search" placeholder="Søg...">
        <button>Søg</button>
    </form>

    <div th:if="${users.isEmpty()}" class="card">
        Ingen brugere
    </div>

    <div th:each="u : ${users}" class="card">
        <a th:href="@{/users/{id}/wishlists(id=${u.id})}">
            <span th:text="${u.name}"></span>
        </a>
        (<span th:text="${u.email}"></span>)
    </div>

</div>
</body>
</html>
