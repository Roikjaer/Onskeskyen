<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Ønskelister</title>
    <style>
        body { margin:0; font-family:Arial; background:#e0f7ff; }
        header { background:#0f6f8f; color:white; padding:15px; }
        .container { padding:20px; }
        .card { background:white; padding:10px; border-radius:8px; margin-bottom:8px; }
    </style>
</head>
<body>

<header>☁️ Ønskeskyen</header>

<div class="container">

    <h1 th:text="${profileUser.name} + 's ønskelister'"></h1>

    <a href="/users">← Tilbage</a>

    <div th:each="wl : ${wishlists}" class="card">
        <a th:href="@{/wishlist/{id}(id=${wl.id})}">
            <span th:text="${wl.name}"></span>
        </a>
        (<span th:text="${wl.wishes.size()}"></span>)
    </div>

</div>
</body>
</html>
