<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title th:text="${profileUser.name} + 's ønskelister'">Ønskelister</title>
</head>
<body>

<h1 th:text="${profileUser.name} + 's ønskelister'">Ønskelister</h1>

<a href="/users">← Tilbage til brugere</a>

<hr>

<div th:if="${wishlists.isEmpty()}">
    <p>Denne bruger har ingen ønskelister endnu.</p>
</div>

<ul th:if="${!wishlists.isEmpty()}">
    <li th:each="wl : ${wishlists}" style="margin-bottom: 8px;">
        <a th:href="@{/wishlist/{id}(id=${wl.id})}">
            <span th:text="${wl.name}"></span>
        </a>
        <span style="color: gray;" th:text="' (' + ${wl.wishes.size()} + ' ønske(r))'"></span>
    </li>
</ul>

</body>
</html>
