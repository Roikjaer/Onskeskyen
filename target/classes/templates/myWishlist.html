<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title th:text="${wishlist.name}">Ønskeliste</title>
</head>
<body>

<h1 th:text="${wishlist.name}">Ønskeliste</h1>

<a href="/wishes">← Tilbage til mine ønskelister</a>

<p>🔗 Del denne ønskeliste med linket: <code th:text="'/wishlist/' + ${wishlist.id}"></code></p>

<hr>

<!-- ADD WISH -->
<h3>Tilføj ønske</h3>
<form method="post" th:action="@{/wishlists/{id}/add(id=${wishlist.id})}">
    <input type="text" name="text" placeholder="Nyt ønske" required>
    <button type="submit">Tilføj</button>
</form>

<hr>

<!-- LIST WISHES (NO reservation status shown!) -->
<div th:if="${wishes.isEmpty()}">
    <p>Ingen ønsker endnu. Tilføj et ovenfor!</p>
</div>

<ul>
    <li th:each="w : ${wishes}" style="margin-bottom: 6px;">

        <span th:text="${w.text}"></span>

        <!-- EDIT -->
        <a th:href="@{/wishes/edit(id=${w.id})}">Edit</a>

        <!-- DELETE -->
        <form method="post" action="/wishes/delete" style="display:inline;">
            <input type="hidden" name="id" th:value="${w.id}">
            <button>Delete</button>
        </form>

    </li>
</ul>

</body>
</html>
