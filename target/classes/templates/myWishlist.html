<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title th:text="${wishlist.name}">Ønskeliste</title>
    <style>
        body { margin:0; font-family:Arial; background:#e0f7ff; }
        header { background:#0f6f8f; color:white; padding:15px; }
        .container { padding:20px; }
        .card { background:white; padding:12px; border-radius:10px; margin-bottom:10px; }
        button { background:#0f6f8f; color:white; border:none; padding:6px 10px; border-radius:8px; }
    </style>
</head>
<body>

<header>☁️ Ønskeskyen</header>

<div class="container">

    <h1 th:text="${wishlist.name}"></h1>

    <a href="/wishes">← Tilbage</a>

    <p>🔗 <code th:text="'/wishlist/' + ${wishlist.id}"></code></p>

    <form method="post" th:action="@{/wishlists/{id}/add(id=${wishlist.id})}" class="card">
        <input type="text" name="text" placeholder="Nyt ønske" required>
        <button>Tilføj</button>
    </form>

    <div th:each="w : ${wishes}" class="card">
        <span th:text="${w.text}"></span>

        <a th:href="@{/wishes/edit(id=${w.id})}">Edit</a>

        <form method="post" action="/wishes/delete" style="display:inline;">
            <input type="hidden" name="id" th:value="${w.id}">
            <button>Delete</button>
        </form>
    </div>

</div>

</body>
</html>
